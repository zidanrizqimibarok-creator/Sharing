<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPYmobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0F172A; color: white; overflow: hidden; }
        .page { position: fixed; inset: 0; display: none; flex-direction: column; padding: 20px; background: #0F172A; }
        .active-page { display: flex; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* BUBBLE CHAT STYLE */
        .player-card { background: white; color: #1E293B; border-radius: 16px; padding: 12px; text-align: center; position: relative; width: 100%; max-width: 130px; margin: auto; transition: 0.3s; }
        .clue-bubble { 
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); 
            background: #6366F1; color: white; padding: 6px 12px; border-radius: 14px; 
            font-size: 10px; font-weight: 800; min-width: 80px; max-width: 150px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); display: none; z-index: 100;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .clue-bubble::after {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            border: 6px solid transparent; border-top-color: #6366F1;
        }
        @keyframes popIn { from { transform: translateX(-50%) scale(0.5); opacity: 0; } to { transform: translateX(-50%) scale(1); opacity: 1; } }
        
        #no-signal { position: fixed; inset: 0; background: black; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="no-signal">
        <h2 class="text-2xl font-black">NO SIGNAL</h2>
        <p class="text-xs opacity-50 mt-2">Connecting to Firebase...</p>
    </div>

    <div id="p-login" class="page active-page items-center justify-center">
        <div class="glass p-8 w-full max-w-sm text-center">
            <h1 class="text-3xl font-black mb-6 italic">SPYmobile</h1>
            <input type="text" id="user-name" placeholder="Nickname..." class="w-full bg-slate-800 p-4 rounded-xl mb-4 border border-slate-700 outline-none font-bold text-white">
            <button onclick="login()" class="w-full bg-indigo-600 py-4 rounded-xl font-black uppercase">MASUK</button>
        </div>
    </div>

    <div id="p-home" class="page">
        <div class="flex justify-between items-center mb-8">
            <h2 id="disp-name" class="text-xl font-black"></h2>
            <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
        </div>
        <button onclick="createRoom()" class="w-full bg-indigo-600 p-8 rounded-[32px] mb-4 flex justify-between items-center">
            <div class="text-left"><h3 class="font-black">Buat Room</h3><p class="text-[10px] opacity-60 font-bold uppercase">Main Bareng AI</p></div>
            <i class="fa-solid fa-plus-circle text-2xl"></i>
        </button>
        <div class="glass p-3 flex gap-2">
            <input type="number" id="room-input" placeholder="ID Room 5 Digit" class="bg-transparent flex-1 px-2 outline-none font-bold text-sm">
            <button onclick="joinRoom()" class="bg-indigo-500 px-6 py-3 rounded-xl text-[10px] font-black">JOIN</button>
        </div>
    </div>

    <div id="p-lobby" class="page">
        <h2 class="text-xl font-black mb-6 text-indigo-400">Room: <span id="lobby-rid"></span></h2>
        <div id="lobby-list" class="grid grid-cols-2 gap-3 flex-1 overflow-y-auto mb-6"></div>
        <button id="btn-play" onclick="triggerStart()" class="w-full bg-indigo-600 py-5 rounded-2xl font-black hidden uppercase">Mulai Permainan</button>
    </div>

    <div id="p-count" class="page items-center justify-center bg-[#0F172A]">
        <div id="count-num" class="text-9xl font-black text-indigo-500">3</div>
    </div>

    <div id="p-game" class="page">
        <div class="flex justify-between items-center mb-6">
            <div id="game-lives" class="flex gap-1 text-rose-500"></div>
            <div id="turn-status" class="bg-indigo-500/20 text-indigo-400 px-3 py-1 rounded-full text-[9px] font-black uppercase">Sesi Diskusi</div>
        </div>
        <div class="glass p-6 text-center mb-12 border-indigo-500/30 border-2">
            <p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Kata Kunci</p>
            <h2 id="g-word" class="text-2xl font-black text-white">????</h2>
        </div>
        
        <div id="g-grid" class="grid grid-cols-2 gap-x-4 gap-y-16 flex-1 overflow-y-auto content-start pt-10"></div>
        
        <div class="mt-4 p-2 glass flex gap-2 rounded-2xl border-t border-white/10">
            <input type="text" id="clue-in" placeholder="Ketik ciri-ciri..." class="bg-transparent flex-1 px-3 outline-none text-xs font-bold text-white">
            <button onclick="sendClue()" class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE ASLI
        const firebaseConfig = {
            apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
            authDomain: "xbook-global26.firebaseapp.com",
            databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "xbook-global26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const OR_KEY = "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";

        let user = { id: localStorage.getItem('sid'), name: localStorage.getItem('sname'), lives: 2 };
        let curRoom = null;
        let isHost = false;

        db.ref(".info/connected").on("value", (snap) => {
            document.getElementById('no-signal').style.display = snap.val() ? 'none' : 'flex';
        });

        window.onload = () => {
            if(!user.id) showPage('login');
            else loadHome();
        };

        function login() {
            const n = document.getElementById('user-name').value;
            if(n.length < 2) return;
            user.id = Math.floor(1000 + Math.random() * 9000).toString();
            user.name = n;
            localStorage.setItem('sid', user.id);
            localStorage.setItem('sname', user.name);
            loadHome();
        }

        function loadHome() {
            showPage('home');
            document.getElementById('disp-name').innerText = user.name;
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('p-' + id).classList.add('active-page');
        }

        // --- ROOM LOGIC ---
        function createRoom() {
            const rid = Math.floor(10000 + Math.random() * 90000).toString();
            curRoom = rid; isHost = true;
            db.ref('rooms/' + rid).set({
                status: 'lobby', host: user.id,
                players: { [user.id]: { name: user.name, lives: 2, isBot: false } }
            });
            openLobby(rid);
        }

        function joinRoom() {
            const rid = document.getElementById('room-input').value;
            db.ref('rooms/' + rid).once('value', s => {
                if(s.exists()){
                    curRoom = rid; isHost = false;
                    db.ref(`rooms/${rid}/players/${user.id}`).set({ name: user.name, lives: 2, isBot: false });
                    openLobby(rid);
                } else alert("Room tidak ditemukan!");
            });
        }

        function openLobby(rid) {
            showPage('lobby');
            document.getElementById('lobby-rid').innerText = rid;
            db.ref(`rooms/${rid}/players`).on('value', s => {
                const list = document.getElementById('lobby-list');
                list.innerHTML = "";
                const ps = s.val() || {};
                Object.values(ps).forEach(p => {
                    list.innerHTML += `<div class="glass p-4 text-center text-xs font-black uppercase">${p.name}</div>`;
                });
                if(isHost) document.getElementById('btn-play').classList.remove('hidden');
            });
            db.ref(`rooms/${rid}/status`).on('value', s => { 
                if(s.val() === 'counting') startCountdown();
                if(s.val() === 'playing') runGameUI();
            });
        }

        function triggerStart() {
            db.ref(`rooms/${curRoom}/status`).set('counting');
        }

        async function startCountdown() {
            showPage('count');
            if(isHost) prepareGameData();
            let c = 3;
            const t = setInterval(() => {
                c--;
                if(c > 0) document.getElementById('count-num').innerText = c;
                else {
                    clearInterval(t);
                    if(isHost) db.ref(`rooms/${curRoom}/status`).set('playing');
                }
            }, 1000);
        }

        async function prepareGameData() {
            const words = await fetchAIWords();
            const snap = await db.ref(`rooms/${curRoom}/players`).get();
            let players = snap.val();
            let pIds = Object.keys(players);

            // AUTO AI BOTS (Total 6 Player)
            const bots = ["Stenly_X", "Nova", "Cipher", "Vortex", "Roxie"];
            while(pIds.length < 6) {
                const bid = "BOT_" + Math.random().toString(36).substr(2, 4);
                players[bid] = { name: bots.pop() || "Bot AI", lives: 2, isBot: true };
                pIds.push(bid);
            }

            const spyId = pIds[Math.floor(Math.random() * pIds.length)];
            pIds.forEach(id => {
                players[id].word = (id === spyId) ? words.spy : words.citizen;
                players[id].role = (id === spyId) ? 'spy' : 'citizen';
            });

            db.ref(`rooms/${curRoom}`).update({ players: players });
        }

        // --- AI LOGIC (FOR CLUES) ---
        async function fetchAIWords() {
            const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${OR_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-001",
                    messages: [{ role: "user", content: "Kasih 2 benda mirip. JSON: {\"citizen\":\"...\", \"spy\":\"...\"}" }]
                })
            });
            const d = await r.json();
            return JSON.parse(d.choices[0].message.content.match(/\{.*\}/s)[0]);
        }

        async function getAIClue(word) {
            const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${OR_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-001",
                    messages: [{ role: "user", content: `Berikan 1 ciri singkat (max 3 kata) tentang ${word} tanpa menyebut namanya.` }]
                })
            });
            const d = await r.json();
            return d.choices[0].message.content.trim();
        }

        function runGameUI() {
            showPage('game');
            db.ref(`rooms/${curRoom}/players`).on('value', s => {
                const grid = document.getElementById('g-grid');
                grid.innerHTML = "";
                const ps = s.val();
                if(!ps[user.id]) return;
                
                document.getElementById('g-word').innerText = ps[user.id].word;
                Object.keys(ps).forEach(pid => {
                    const p = ps[pid];
                    grid.innerHTML += `
                        <div class="player-card shadow-lg">
                            <div id="bubble-${pid}" class="clue-bubble">${p.lastClue || ''}</div>
                            <div class="w-12 h-12 bg-indigo-600 text-white rounded-full mx-auto mb-2 flex items-center justify-center font-black">${p.name[0]}</div>
                            <h4 class="text-[9px] font-black uppercase truncate">${p.name}</h4>
                            <div class="text-[8px] mt-1">${'❤️'.repeat(p.lives)}</div>
                        </div>`;
                    if(p.lastClue) document.getElementById(`bubble-${pid}`).style.display = 'block';
                });

                // AI TURN LOGIC
                if(isHost) {
                    Object.keys(ps).forEach(pid => {
                        if(ps[pid].isBot && !ps[pid].lastClue) {
                            setTimeout(async () => {
                                const clue = await getAIClue(ps[pid].word);
                                db.ref(`rooms/${curRoom}/players/${pid}`).update({ lastClue: clue });
                            }, Math.random() * 5000 + 3000);
                        }
                    });
                }
            });
            renderLives();
        }

        function sendClue() {
            const v = document.getElementById('clue-in').value;
            if(!v) return;
            db.ref(`rooms/${curRoom}/players/${user.id}`).update({ lastClue: v });
            document.getElementById('clue-in').value = "";
        }

        function renderLives() {
            const l = document.getElementById('game-lives');
            l.innerHTML = "";
            for(let i=0; i<user.lives; i++) l.innerHTML += '<i class="fa-solid fa-heart"></i>';
        }
    </script>
</body>
</html>
