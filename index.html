<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZLA AI - REALTIME LOBBY & RANK</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #FF78C4; --s: #9DE219; --a: #4CC9FE; --y: #FFF9C4; --d: #2D3436; --w: #FFFFFF; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--a); font-family: 'Fredoka', sans-serif; }
        #viewport-fix { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        .stage { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .stage.active { display: flex; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; padding: 20px; border-radius: 30px; border: 5px solid var(--d); box-shadow: 8px 8px 0px var(--d); width: 95%; max-width: 340px; text-align: center; position: relative; }
        .title-text { font-size: 2.5rem; color: white; text-shadow: 4px 4px 0 var(--d); -webkit-text-stroke: 1.5px var(--d); margin-bottom: 20px; }
        
        .btn-main { background: var(--s); padding: 15px; width: 100%; border: 4px solid var(--d); border-radius: 18px; cursor: pointer; font-weight: 900; box-shadow: 0 6px 0 var(--d); margin-top: 10px; color: var(--d); }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--d); }
        
        .inp-field { width: 100%; padding: 12px; margin: 8px 0; border: 4px solid var(--d); border-radius: 15px; font-weight: bold; text-align: center; }
        textarea { height: 100px; font-family: monospace; font-size: 11px; }

        /* LOBBY LIST */
        .player-tag { background: var(--y); border: 3px solid var(--d); padding: 8px 15px; border-radius: 12px; margin: 5px; display: inline-block; font-weight: bold; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        /* RANKING ANIMATION */
        .rank-item { background: white; border: 4px solid var(--d); padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: 900; transform: translateX(-100px); opacity: 0; transition: 0.5s; }
        .rank-item.show { transform: translateX(0); opacity: 1; }
        .rank-1 { background: #ffd700; }

        #zla-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 80%; background: #ff4757; color: white; padding: 12px; border-radius: 15px; border: 4px solid var(--d); z-index: 10000; text-align: center; transition: 0.4s; }
    </style>
</head>
<body>

<div id="zla-toast">NOTIFIKASI</div>

<div id="viewport-fix">
    <div id="main-app" style="width:100%; height:100%;">
        <div id="stage-login" class="stage active">
            <h1 class="title-text">LIQU IDEA</h1>
            <div class="card">
                <input type="text" id="player-name" class="inp-field" placeholder="Nama Kamu...">
                <button class="btn-main" onclick="zla.login()">MASUK</button>
            </div>
        </div>

        <div id="stage-menu" class="stage">
            <div class="card">
                <button class="btn-main" onclick="zla.go('stage-host')">BUAT ROOM</button>
                <button class="btn-main" style="background:var(--p)" onclick="zla.go('stage-join')">GABUNG ROOM</button>
            </div>
        </div>

        <div id="stage-host" class="stage">
            <div class="card">
                <h3>INPUT JSON SOAL</h3>
                <textarea id="manual-json" class="inp-field" placeholder='{"data":[{"q":"Soal?","o":["A","B","C","D"],"a":"A"}]}'></textarea>
                <button class="btn-main" onclick="zla.createRoom()">BUAT & SYNC</button>
            </div>
        </div>

        <div id="stage-join" class="stage">
            <div class="card">
                <h3>KODE ROOM</h3>
                <input type="number" id="join-code" class="inp-field">
                <button class="btn-main" onclick="zla.joinRoom()">GABUNG</button>
            </div>
        </div>

        <div id="stage-lobby" class="stage">
            <div class="card">
                <h2 id="v-room-id" style="background:var(--d); color:var(--s); padding:10px; border-radius:10px;">ROOM: ----</h2>
                <p>Pemain yang Join:</p>
                <div id="player-list" style="margin: 15px 0; min-height: 50px;"></div>
                <div id="host-tools" style="display:none">
                    <button class="btn-main" onclick="zla.startGame()">MULAI SEKARANG</button>
                </div>
                <p id="wait-msg">Menunggu Host...</p>
            </div>
        </div>

        <div id="stage-quiz" class="stage">
            <div class="card">
                <div id="v-question" style="font-weight:900; margin-bottom:20px;">...</div>
                <div id="v-options"></div>
            </div>
        </div>

        <div id="stage-rank" class="stage">
            <h1 class="title-text">PAPAN SKOR</h1>
            <div class="card" id="rank-container" style="background:none; border:none; box-shadow:none;"></div>
            <button class="btn-main" onclick="location.reload()">MAIN LAGI</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
  authDomain: "xbook-global26.firebaseapp.com",
  databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "xbook-global26",
  storageBucket: "xbook-global26.firebasestorage.app",
  messagingSenderId: "384795261277",
  appId: "1:384795261277:web:6a2b05dbea819b4f4590b4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.zla = {
    user: { name: "", score: 0, id: "" },
    roomCode: "",
    questions: [],
    index: 0,

    go(id) {
        document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    login() {
        const n = document.getElementById('player-name').value.trim();
        if(!n) return;
        this.user.name = n;
        this.user.id = "p_" + Date.now();
        this.go('stage-menu');
    },

    createRoom() {
        const jsonRaw = document.getElementById('manual-json').value;
        try {
            const parsed = JSON.parse(jsonRaw);
            this.questions = parsed.data;
            this.roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            
            set(ref(db, 'rooms/' + this.roomCode), {
                status: "waiting",
                questions: this.questions,
                players: { [this.user.id]: { name: this.user.name, score: 0 } }
            });

            this.listenToLobby();
            document.getElementById('host-tools').style.display = 'block';
            document.getElementById('wait-msg').style.display = 'none';
            this.go('stage-lobby');
        } catch(e) { alert("JSON Rusak!"); }
    },

    joinRoom() {
        const code = document.getElementById('join-code').value;
        onValue(ref(db, 'rooms/' + code), (snap) => {
            const data = snap.val();
            if(data) {
                this.roomCode = code;
                this.questions = data.questions;
                update(ref(db, `rooms/${code}/players/${this.user.id}`), { name: this.user.name, score: 0 });
                this.listenToLobby();
                this.go('stage-lobby');
            }
        }, { onlyOnce: true });
    },

    listenToLobby() {
        document.getElementById('v-room-id').innerText = "ROOM: " + this.roomCode;
        // Listen Pemain Join
        onValue(ref(db, `rooms/${this.roomCode}/players`), (snap) => {
            const players = snap.val();
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            if(players) {
                Object.values(players).forEach(p => {
                    list.innerHTML += `<span class="player-tag">👤 ${p.name}</span>`;
                });
            }
        });
        // Listen Status Mulai
        onValue(ref(db, `rooms/${this.roomCode}/status`), (snap) => {
            if(snap.val() === "playing") this.startQuiz();
            if(snap.val() === "finished") this.showRanking();
        });
    },

    startGame() { update(ref(db, 'rooms/' + this.roomCode), { status: "playing" }); },

    startQuiz() { this.index = 0; this.go('stage-quiz'); this.renderQ(); },

    renderQ() {
        if(this.index >= this.questions.length) return this.finishQuiz();
        const q = this.questions[this.index];
        document.getElementById('v-question').innerText = q.q;
        const optBox = document.getElementById('v-options'); optBox.innerHTML = "";
        q.o.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "btn-main"; btn.style.background = "white"; btn.innerText = o;
            btn.onclick = () => {
                if(o === q.a) this.user.score += 10;
                update(ref(db, `rooms/${this.roomCode}/players/${this.user.id}`), { score: this.user.score });
                this.index++; this.renderQ();
            };
            optBox.appendChild(btn);
        });
    },

    finishQuiz() {
        this.go('stage-lobby');
        document.getElementById('wait-msg').innerText = "Menunggu pemain lain selesai...";
        // Hanya host yang bisa ganti status ke finished (Opsional: otomatis jika semua selesai)
        setTimeout(() => {
            update(ref(db, 'rooms/' + this.roomCode), { status: "finished" });
        }, 3000);
    },

    showRanking() {
        this.go('stage-rank');
        const container = document.getElementById('rank-container');
        onValue(ref(db, `rooms/${this.roomCode}/players`), (snap) => {
            const players = Object.values(snap.val() || {});
            // Urutkan skor tertinggi
            players.sort((a, b) => b.score - a.score);
            
            container.innerHTML = "";
            players.forEach((p, i) => {
                const item = document.createElement('div');
                item.className = `rank-item ${i === 0 ? 'rank-1' : ''}`;
                item.innerHTML = `<span>#${i+1} ${p.name}</span> <span>${p.score} PT</span>`;
                container.appendChild(item);
                
                // Animasi muncul satu-per-satu
                setTimeout(() => item.classList.add('show'), i * 400);
            });
        }, { onlyOnce: true });
    }
};
</script>
</body>
</html>
