<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPYmobile Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0F172A; color: white; overflow: hidden; }
        .page { position: fixed; inset: 0; display: none; flex-direction: column; padding: 20px; background: #0F172A; }
        .active-page { display: flex; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* FIX: Bubble Clue Auto Height */
        .player-card { background: white; color: #1E293B; border-radius: 16px; padding: 10px; text-align: center; position: relative; width: 100%; max-width: 105px; margin: auto; }
        .clue-bubble { 
            position: absolute; bottom: 115%; left: 50%; transform: translateX(-50%); 
            background: #6366F1; color: white; padding: 8px 12px; border-radius: 14px; 
            font-size: 9px; font-weight: 700; min-width: 90px; width: 120px; 
            white-space: normal; word-wrap: break-word; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100; display: none;
        }
        .clue-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #6366F1; }
        
        .btn-vote-red { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: #EF4444; color: white; font-size: 8px; font-weight: 900; padding: 4px 10px; border-radius: 20px; border: 2px solid white; z-index: 110; }
        .timer-line { height: 4px; background: #6366F1; border-radius: 2px; transition: width 0.5s linear; }
        #overlay-result { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="overlay-result">
        <h2 id="res-title" class="text-3xl font-black italic mb-4 text-indigo-500"></h2>
        <p id="res-desc" class="text-lg font-bold mb-8"></p>
        <p class="text-[10px] opacity-50 uppercase tracking-widest">Lobby in 3s...</p>
    </div>

    <div id="p-login" class="page active-page items-center justify-center">
        <div class="glass p-8 w-full max-w-sm text-center">
            <h1 class="text-3xl font-black mb-6 italic">SPY<span class="text-indigo-500">mobile</span></h1>
            <input type="text" id="user-name" placeholder="Nickname..." class="w-full bg-slate-800 p-4 rounded-xl mb-4 border border-slate-700 outline-none font-bold text-white">
            <button onclick="login()" class="w-full bg-indigo-600 py-4 rounded-xl font-black uppercase">Play Game</button>
        </div>
    </div>

    <div id="p-home" class="page">
        <h2 id="disp-name" class="text-xl font-black mb-10 text-indigo-400"></h2>
        <button onclick="createRoom()" class="w-full bg-indigo-600 p-8 rounded-[32px] mb-4 flex justify-between items-center">
            <div class="text-left"><h3 class="font-black uppercase">Host Room</h3><p class="text-[10px] opacity-60">Manage Players & AI</p></div>
            <i class="fa-solid fa-crown text-2xl"></i>
        </button>
        <div class="glass p-3 flex gap-2">
            <input type="number" id="room-input" placeholder="Enter ID Room" class="bg-transparent flex-1 px-2 outline-none font-bold">
            <button onclick="joinRoom()" class="bg-indigo-500 px-6 py-3 rounded-xl text-xs font-black uppercase">Join</button>
        </div>
    </div>

    <div id="p-lobby" class="page">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black text-indigo-400 uppercase">Room: <span id="lobby-rid"></span></h2>
            <div id="host-opt" class="hidden flex items-center gap-2">
                <input type="number" id="p-limit" value="3" min="2" max="10" class="w-10 bg-slate-800 p-1 rounded text-center font-bold text-xs border border-indigo-500">
                <span class="text-[8px] font-black uppercase">Players</span>
            </div>
        </div>
        <div id="lobby-list" class="grid grid-cols-2 gap-3 flex-1 overflow-y-auto mb-6"></div>
        <button id="btn-start" onclick="triggerStart()" class="w-full bg-indigo-600 py-5 rounded-2xl font-black hidden uppercase tracking-widest">Launch Match</button>
    </div>

    <div id="p-count" class="page items-center justify-center text-9xl font-black text-indigo-500">3</div>

    <div id="p-game" class="page">
        <div class="mb-4">
            <div class="flex justify-between items-center mb-1">
                <div id="g-lives" class="flex gap-1 text-rose-500"></div>
                <div id="g-phase" class="bg-indigo-500 text-[8px] font-black px-3 py-1 rounded-full uppercase">Wait</div>
            </div>
            <div class="w-full bg-slate-800 h-1 rounded-full overflow-hidden"><div id="timer-bar" class="timer-line w-full"></div></div>
        </div>
        <div class="glass p-5 text-center mb-12 border-indigo-500/30 border-2">
            <p id="g-round-info" class="text-[9px] font-black opacity-40 uppercase mb-1">Session 1</p>
            <h2 id="g-word" class="text-2xl font-black text-white tracking-widest uppercase">????</h2>
        </div>
        <div id="g-grid" class="grid grid-cols-2 gap-x-3 gap-y-16 flex-1 overflow-y-auto content-start pt-10 pb-10"></div>
        <div id="g-input" class="mt-4 p-2 glass flex gap-2 rounded-2xl border-t border-white/10">
            <input type="text" id="clue-in" placeholder="Type your clue..." class="bg-transparent flex-1 px-3 outline-none text-xs font-bold text-white">
            <button onclick="sendClue()" class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBoS3INezO0UQptcXYNZFbnPbmmf_hU8xc",
            authDomain: "xbook-global26.firebaseapp.com",
            databaseURL: "https://xbook-global26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "xbook-global26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const OR_KEY = "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";

        let user = { id: localStorage.getItem('sid'), name: localStorage.getItem('sname'), lives: 2 };
        let curRoom = null; let isHost = false; let hasVoted = false;

        window.onload = () => { if(!user.id) showPage('login'); else loadHome(); };

        function login() {
            const n = document.getElementById('user-name').value;
            if(n.length < 2) return;
            user.id = "U" + Math.floor(Math.random() * 8999 + 1000); user.name = n;
            localStorage.setItem('sid', user.id); localStorage.setItem('sname', n);
            loadHome();
        }

        function loadHome() { showPage('home'); document.getElementById('disp-name').innerText = user.name.toUpperCase(); }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('p-' + id).classList.add('active-page');
        }

        function createRoom() {
            const rid = Math.floor(Math.random() * 89999 + 10000).toString();
            curRoom = rid; isHost = true;
            db.ref('rooms/' + rid).set({
                status: 'lobby', host: user.id, phase: 'diskusi', round: 1, timer: 30,
                players: { [user.id]: { name: user.name, lives: 2, isBot: false, clue: "", votes: 0, votedId: "" } }
            });
            openLobby(rid);
        }

        function joinRoom() {
            const rid = document.getElementById('room-input').value;
            if(!rid) return;
            db.ref('rooms/' + rid).once('value', s => {
                if(s.exists()){
                    curRoom = rid; isHost = false;
                    db.ref(`rooms/${rid}/players/${user.id}`).set({ name: user.name, lives: 2, isBot: false, clue: "", votes: 0, votedId: "" });
                    openLobby(rid);
                }
            });
        }

        function openLobby(rid) {
            showPage('lobby');
            document.getElementById('lobby-rid').innerText = rid;
            if(isHost) document.getElementById('host-opt').classList.remove('hidden');

            db.ref(`rooms/${rid}/players`).on('value', s => {
                const list = document.getElementById('lobby-list');
                list.innerHTML = "";
                const ps = s.val() || {};
                Object.values(ps).forEach(p => { list.innerHTML += `<div class="glass p-4 text-center text-[10px] font-black uppercase">${p.name}</div>`; });
                if(isHost) document.getElementById('btn-start').classList.remove('hidden');
            });

            db.ref(`rooms/${rid}/status`).on('value', s => {
                if(s.val() === 'counting') runCountdown();
                if(s.val() === 'playing') startGameUI();
            });
        }

        function triggerStart() {
            const limit = parseInt(document.getElementById('p-limit').value) || 3;
            db.ref(`rooms/${curRoom}`).update({ status: 'counting', pLimit: limit });
        }

        async function runCountdown() {
            showPage('count');
            let c = 3;
            const t = setInterval(() => {
                c--;
                if(c > 0) document.getElementById('p-count').innerText = c;
                else {
                    clearInterval(t);
                    if(isHost) db.ref(`rooms/${curRoom}`).update({ status: 'playing' });
                }
            }, 1000);

            if(isHost) {
                const words = await fetchAIWords();
                const snap = await db.ref(`rooms/${curRoom}`).get();
                let players = snap.val().players;
                let limit = snap.val().pLimit || 3;
                
                const bots = ["VORTEX_AI", "CYPHER_X", "NOVA_BOT", "ZENITH"];
                while(Object.keys(players).length < limit) {
                    const bid = "BOT_" + Math.random().toString(36).substr(2,4);
                    players[bid] = { name: bots.pop() || "COM", lives: 2, isBot: true, clue: "", votes: 0, votedId: "" };
                }

                const ids = Object.keys(players);
                const spyId = ids[Math.floor(Math.random() * ids.length)];
                ids.forEach(id => {
                    players[id].word = (id === spyId) ? words.spy : words.citizen;
                    players[id].role = (id === spyId) ? 'spy' : 'citizen';
                });
                db.ref(`rooms/${curRoom}`).update({ players: players, phase: 'diskusi', timer: 30, round: 1 });
            }
        }

        async function fetchAIWords() {
            try {
                const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${OR_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "google/gemini-2.0-flash-001", messages: [{ role: "user", content: "Reply ONLY JSON: {\"citizen\":\"...\", \"spy\":\"...\"}" }] })
                });
                const d = await r.json();
                return JSON.parse(d.choices[0].message.content.match(/\{.*\}/s)[0]);
            } catch(e) { return { citizen: "Gelas", spy: "Piring" }; }
        }

        function startGameUI() {
            showPage('game');
            db.ref(`rooms/${curRoom}`).on('value', s => {
                const rd = s.val(); if(!rd) return;
                const ps = rd.players;
                document.getElementById('g-word').innerText = ps[user.id].word;
                document.getElementById('g-phase').innerText = rd.phase.toUpperCase();
                document.getElementById('g-round-info').innerText = `SESSION ${rd.round}`;
                document.getElementById('timer-bar').style.width = (rd.timer / (rd.phase==='diskusi'?30:20) * 100) + "%";

                const grid = document.getElementById('g-grid');
                grid.innerHTML = "";
                Object.keys(ps).forEach(pid => {
                    const p = ps[pid];
                    grid.innerHTML += `
                        <div class="player-card shadow-lg ${p.votedId === user.id ? 'ring-2 ring-rose-500' : ''}">
                            <button class="btn-vote-red" style="display:${rd.phase==='vote' && pid !== user.id && !hasVoted ? 'block':'none'}" onclick="castVote('${pid}')">VOTE</button>
                            <div id="bubble-${pid}" class="clue-bubble" style="display:${p.clue?'block':'none'}">${p.clue}</div>
                            <div class="w-10 h-10 bg-indigo-600 text-white rounded-full mx-auto mb-1 flex items-center justify-center font-black">${p.name[0]}</div>
                            <h4 class="text-[8px] font-black uppercase truncate">${p.name}</h4>
                            <div class="text-[7px] mt-1">${'❤️'.repeat(p.lives)}</div>
                        </div>`;
                    
                    if(isHost && p.isBot && rd.phase === 'diskusi' && !p.clue) handleBotClue(pid, p.word);
                    if(isHost && p.isBot && rd.phase === 'vote' && !p.votedId) handleBotVote(pid, ps);
                });

                if(isHost) manageHostTimer(rd);
            });
            renderLives();
        }

        async function handleBotClue(bid, word) {
            try {
                const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${OR_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "google/gemini-2.0-flash-001", messages: [{ role: "user", content: `Clue 3 words for ${word}` }] })
                });
                const d = await r.json();
                db.ref(`rooms/${curRoom}/players/${bid}`).update({ clue: d.choices[0].message.content.trim() });
            } catch(e) { db.ref(`rooms/${curRoom}/players/${bid}`).update({ clue: "Biasa dipakai..." }); }
        }

        function handleBotVote(bid, players) {
            const ids = Object.keys(players).filter(id => id !== bid);
            const target = ids[Math.floor(Math.random() * ids.length)];
            db.ref(`rooms/${curRoom}/players/${target}/votes`).transaction(c => (c||0)+1);
            db.ref(`rooms/${curRoom}/players/${bid}`).update({ votedId: target });
        }

        function manageHostTimer(rd) {
            if(window.timerActive) return;
            window.timerActive = true;
            let currentTimer = rd.timer;

            const interval = setInterval(async () => {
                currentTimer--;
                
                const snap = await db.ref(`rooms/${curRoom}/players`).get();
                const ps = snap.val();
                const allClued = Object.values(ps).every(p => p.clue !== "");
                const allVoted = Object.values(ps).every(p => p.votedId !== "");

                if((rd.phase === 'diskusi' && allClued) || currentTimer <= 0 || (rd.phase === 'vote' && allVoted)) {
                    clearInterval(interval);
                    window.timerActive = false;
                    if(rd.phase === 'diskusi') {
                        if(rd.round < 2) {
                            Object.keys(ps).forEach(id => db.ref(`rooms/${curRoom}/players/${id}`).update({ clue: "" }));
                            db.ref(`rooms/${curRoom}`).update({ round: 2, timer: 30 });
                        } else {
                            db.ref(`rooms/${curRoom}`).update({ phase: 'vote', timer: 20 });
                        }
                    } else {
                        processFinalVote(ps);
                    }
                } else {
                    db.ref(`rooms/${curRoom}`).update({ timer: currentTimer });
                }
            }, 1000);
        }

        async function processFinalVote(ps) {
            let max = -1; let targetId = null;
            Object.keys(ps).forEach(id => { if(ps[id].votes > max) { max = ps[id].votes; targetId = id; } });

            const overlay = document.getElementById('overlay-result');
            overlay.style.display = 'flex';
            const target = ps[targetId];

            if(target.role === 'spy') {
                document.getElementById('res-title').innerText = "SPY ELIMINATED!";
                document.getElementById('res-desc').innerText = `${target.name} Was The Spy!`;
                setTimeout(() => { location.reload(); }, 3000);
            } else {
                document.getElementById('res-title').innerText = "WRONG KICK!";
                document.getElementById('res-desc').innerText = `${target.name} Is Citizen!`;
                Object.keys(ps).forEach(id => { if(ps[id].role === 'citizen') db.ref(`rooms/${curRoom}/players/${id}`).update({ lives: 1 }); });
                setTimeout(() => {
                    overlay.style.display = 'none';
                    hasVoted = false;
                    db.ref(`rooms/${curRoom}`).update({ phase: 'diskusi', round: 1, timer: 30 });
                    Object.keys(ps).forEach(id => db.ref(`rooms/${curRoom}/players/${id}`).update({ clue: "", votes: 0, votedId: "" }));
                }, 3000);
            }
        }

        function castVote(id) {
            if(hasVoted) return;
            hasVoted = true;
            db.ref(`rooms/${curRoom}/players/${id}/votes`).transaction(c => (c || 0) + 1);
            db.ref(`rooms/${curRoom}/players/${user.id}`).update({ votedId: id });
        }

        function sendClue() {
            const v = document.getElementById('clue-in').value; if(!v) return;
            db.ref(`rooms/${curRoom}/players/${user.id}`).update({ clue: v });
            document.getElementById('clue-in').value = "";
        }

        function renderLives() {
            const l = document.getElementById('g-lives'); l.innerHTML = "";
            for(let i=0; i<user.lives; i++) l.innerHTML += '<i class="fa-solid fa-heart"></i>';
        }
    </script>
</body>
</html>
