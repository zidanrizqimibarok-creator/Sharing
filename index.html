<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZHERING SHARING - PREMIIUM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
    <style>
        :root {
            --primary: #8bc34a;
            --primary-glow: rgba(139, 195, 74, 0.4);
            --dark-bg: #101012;
            --tech-bg: url('https://www.transparenttextures.com/patterns/dark-dot-grid.png');
            --overlay: rgba(0, 0, 0, 0.95);
            --text-glow: 0 0 10px rgba(255,255,255,0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: var(--dark-bg);
            background-image: var(--tech-bg);
            color: white;
            overflow: hidden;
            touch-action: none;
            cursor: none;
        }

        /* --- Animations & Utilities --- */
        .fade-in { animation: fadeIn 0.8s ease-in forwards; }
        .fade-out { animation: fadeOut 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(1vh); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-1vh); } }
        .hide { display: none !important; }

        /* --- 1. BOOTING SCREEN (WHITE, DEVELOPER) --- */
        #booting {
            position: fixed; inset: 0; background: white; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .boot-logo { width: 50vw; max-width: 400px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.1)); animation: pulse-logo 2.5s ease-in-out infinite; }
        @keyframes pulse-logo { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

        /* --- 2. MAIN INTERFACE --- */
        #app {
            display: none; height: 100vh; width: 100vw;
            flex-direction: column; align-items: center; justify-content: space-around;
            z-index: 100;
        }
        .main-logo-area { display: flex; flex-direction: column; align-items: center; }
        .main-icon { width: 30vw; max-width: 300px; filter: drop-shadow(0 0 20px var(--primary-glow)); animation: iconGlow 4s infinite alternate; }
        @keyframes iconGlow { from { filter: drop-shadow(0 0 10px var(--primary-glow)); } to { filter: drop-shadow(0 0 35px var(--primary)); } }
        .app-title { color: var(--primary); font-size: 8vw; max-size: 3em; margin: 0; font-weight: 800; text-transform: uppercase; text-shadow: var(--text-glow); }
        .boot-slogan { color: #fff; font-weight: 900; font-size: 5vw; max-size: 2em; letter-spacing: 0.5vw; text-transform: uppercase; margin-top: -1vh; text-shadow: var(--text-glow); opacity: 0; animation: fadeInSlogan 1s 1.5s forwards; }
        @keyframes fadeInSlogan { to { opacity: 1; } }

        .btn-group { display: flex; flex-direction: column; gap: 3vh; width: 80vw; max-width: 400px; }
        .btn-menu {
            position: relative; padding: 2.5vh 0; width: 100%;
            font-weight: bold; font-size: 5vw; max-size: 1.5em;
            text-transform: uppercase; letter-spacing: 0.3vw;
            border-radius: 10px; border: 2px solid transparent;
            cursor: pointer; transition: 0.3s;
            overflow: hidden; background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: center;
        }
        .btn-send { border-color: #f44336; color: white; background: rgba(244,67,54,0.1); }
        .btn-send:hover { background: #f44336; box-shadow: 0 0 15px rgba(244,67,54,0.4); }
        .btn-receive { border-color: var(--primary); color: white; background: rgba(139,195,74,0.1); }
        .btn-receive:hover { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* --- 3. CONNECTION MODE & QR --- */
        #mode-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95);
            z-index: 500; flex-direction: column; align-items: center; justify-content: space-around;
        }
        .mode-title { font-size: 6vw; font-weight: bold; text-shadow: var(--text-glow); margin-top: 5vh; }
        
        /* QR Code Container (Mode Terima) */
        #qr-container { display: none; flex-direction: column; align-items: center; }
        #qr-code { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 0 30px rgba(255,255,255,0.1); }
        .peer-id-text { font-size: 3vw; color: rgba(255,255,255,0.6); margin-top: 1vh; }

        /* QR Scanner Container (Mode Kirim) */
        #scanner-container { display: none; position: relative; width: 80vw; height: 80vw; border-radius: 20px; overflow: hidden; border: 4px solid var(--primary); box-shadow: 0 0 30px var(--primary-glow); }
        #scanner-video { width: 100%; height: 100%; object-fit: cover; }
        .scanner-laserscan { position: absolute; inset: 0; background: linear-gradient(0deg, transparent, rgba(139, 195, 74, 0.2), transparent); animation: scanline 2s infinite; }
        @keyframes scanline { from { transform: translateY(-100%); } to { transform: translateY(100%); } }

        /* --- 4. TRANSFER OVERLAY & PROGRESS --- */
        #transfer-overlay {
            display: none; position: fixed; inset: 0; background: var(--overlay);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .progress-circle-container { position: relative; width: 40vw; height: 40vw; max-width: 250px; max-height: 250px; display: flex; align-items: center; justify-content: center; }
        .progress-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .progress-circle-bg { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 15; }
        .progress-circle-fill {
            fill: none; stroke: var(--primary); stroke-width: 15;
            stroke-dasharray: 502; stroke-dashoffset: 502; /* 2 * PI * r */
            transition: stroke-dashoffset 0.1s linear;
            filter: drop-shadow(0 0 15px var(--primary));
        }
        .progress-text { position: absolute; font-size: 8vw; font-weight: bold; color: white; text-shadow: var(--text-glow); }
        #transfer-status { margin-top: 4vh; font-size: 4vw; color: rgba(255,255,255,0.7); width: 80vw; text-align: center; }
        #transfer-meta { font-size: 3vw; color: rgba(255,255,255,0.4); margin-top: 1vh; }

        /* --- 5. CUSTOM NOTIFICATIONS & DIALOGS --- */
        #custom-dialog {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 3000; align-items: center; justify-content: center;
        }
        .dialog-content {
            background: #1a1a1c; border: 1px solid #333;
            padding: 4vh; border-radius: 10px;
            text-align: center; width: 80vw; max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .dialog-title { color: var(--primary); font-size: 5vw; margin-bottom: 2vh; font-weight: bold; text-shadow: var(--text-glow); }
        .dialog-msg { font-size: 3.5vw; color: rgba(255,255,255,0.8); margin-bottom: 3vh; line-height: 1.4; }
        .dialog-btns { display: flex; gap: 2vh; justify-content: center; }

    </style>
</head>
<body>

    <div id="booting">
        <img src="https://cdn.phototourl.com/free/2026-03-23-7357efed-c717-4abd-9c87-dcf33b5d3717.png" class="boot-logo" alt="Ligth Studio Developer">
    </div>

    <div id="app">
        <div class="main-logo-area">
            <img src="https://cdn.phototourl.com/free/2026-03-23-40adb230-f8af-4693-9db6-3ce641374609.png" class="main-icon" alt="Zhering Icon">
            <h1 class="app-title">ZHERING SHARING</h1>
            <p class="boot-slogan">SATU FILE SATU DETIK</p>
        </div>
        
        <div class="btn-group">
            <button class="btn-menu btn-send" onclick="startSendMode()"><i class="fas fa-paper-plane" style="margin-right: 15px;"></i>KIRIM FILE</button>
            <button class="btn-menu btn-receive" onclick="startReceiveMode()"><i class="fas fa-qrcode" style="margin-right: 15px;"></i>TERIMA FILE</button>
        </div>
        <p style="font-size: 0.8em; color: rgba(255,255,255,0.3); width: 80vw; text-align: center;">P2P Transfer v3.0</p>
        <input type="file" id="fileInput" style="display: none;">
    </div>

    <div id="mode-overlay">
        <button class="btn-menu btn-receive" style="position: absolute; top: 2vh; right: 5vw; width: auto; padding: 1.5vh 3vw; font-size: 3vw; z-index: 600;" onclick="closeModeOverlay()">BACK</button>
        <div class="mode-title" id="mode-title">KONEKSI...</div>

        <div id="qr-container">
            <div id="qr-code"></div>
            <p class="peer-id-text" id="peer-id-display">ID: Menghubungkan...</p>
        </div>

        <div id="scanner-container">
            <video id="scanner-video"></video>
            <div class="scanner-laserscan"></div>
        </div>

        <p id="mode-status-text" style="font-size: 3vw; color: rgba(255,255,255,0.5); width: 80vw; text-align: center;">Menyiapkan koneksi...</p>
    </div>

    <div id="transfer-overlay">
        <div class="progress-circle-container">
            <svg class="progress-svg" viewBox="0 0 170 170">
                <circle class="progress-circle-bg" cx="85" cy="85" r="80" />
                <circle class="progress-circle-fill" id="progress-bar" cx="85" cy="85" r="80" />
            </svg>
            <div class="progress-text" id="progress-val">0%</div>
        </div>
        <h3 id="transfer-status">Memproses transfer...</h3>
        <p id="transfer-meta">Kecepatan: -- MB/s</p>
    </div>

    <div id="custom-dialog">
        <div class="dialog-content fade-in">
            <div class="dialog-title" id="dialog-title">Notifikasi</div>
            <p class="dialog-msg" id="dialog-msg"></p>
            <div class="dialog-btns">
                <button class="btn-menu btn-receive" style="padding: 1vh 5vw; font-size: 3.5vw;" id="dialog-confirm-btn">OK</button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const boot = document.getElementById('booting');
        const app = document.getElementById('app');
        const fileInput = document.getElementById('fileInput');
        
        // Mode/Koneksi Elements
        const modeOverlay = document.getElementById('mode-overlay');
        const modeTitle = document.getElementById('mode-title');
        const qrContainer = document.getElementById('qr-container');
        const qrCodeEl = document.getElementById('qr-code');
        const peerIdDisplay = document.getElementById('peer-id-display');
        const scannerContainer = document.getElementById('scanner-container');
        const scannerVideo = document.getElementById('scanner-video');
        const modeStatusText = document.getElementById('mode-status-text');
        
        // Transfer Elements
        const transferOverlay = document.getElementById('transfer-overlay');
        const progressBar = document.getElementById('progress-bar');
        const progressVal = document.getElementById('progress-val');
        const transferStatus = document.getElementById('transfer-status');
        const transferMeta = document.getElementById('transfer-meta');
        
        // Custom Dialog Elements
        const customDialog = document.getElementById('custom-dialog');
        const dialogTitle = document.getElementById('dialog-title');
        const dialogMsg = document.getElementById('dialog-msg');
        const dialogConfirmBtn = document.getElementById('dialog-confirm-btn');

        // Total Keliling Progress Lingkaran
        const circumference = 2 * Math.PI * 80;

        // Scanner Instance
        let codeReader;

        // --- Simulasi Booting 5 detik ---
        setTimeout(() => {
            boot.classList.add('fade-out');
            setTimeout(() => {
                boot.style.display = 'none';
                app.style.display = 'flex';
                app.classList.add('fade-in');
            }, 800);
        }, 5000); // 5 detik total booting

        // --- P2P Networking Logic (PeerJS) ---
        let peer;
        let peerId;
        const peerConfig = {
            host: 'peerjs-server.herokuapp.com', // Server handshake
            secure: true,
            port: 443,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
        };

        function startNetwork() {
            if(peer) return; // Prevent multiple instances
            modeStatusText.innerText = "Menghubungkan ke server handshake...";
            peer = new Peer(peerConfig);

            peer.on('open', (id) => {
                peerId = id;
                peerIdDisplay.innerText = "ID ANDA: " + id;
                generateQrCode(id);
                modeStatusText.innerText = "QR Code Siap untuk dipindai.";
            });

            peer.on('error', (err) => {
                showCustomDialog("Jaringan Gagal", "Gagal menghubungkan ke server handshake. Coba lagi.", "RETRY", startNetwork);
            });

            // Logic Penerimaan File Kritis
            peer.on('connection', (conn) => {
                modeStatusText.innerText = "Mendapat koneksi dari " + conn.peer + "...";
                
                conn.on('data', (data) => {
                    if (data.type === 'transfer-init') {
                        transferOverlay.style.display = 'flex';
                        transferStatus.innerText = "Menerima file '" + data.name + "'...";
                        setProgress(0);
                    } else if (data.type === 'transfer-progress') {
                        setProgress(data.percent);
                        transferMeta.innerText = "Sisa: " + formatTimeRemaining(data.duration, data.totalChunks, data.currentChunk);
                    } else if (data.type === 'file-final') {
                        setProgress(100);
                        setTimeout(() => {
                            const blob = new Blob([data.file]);
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = data.name;
                            a.click();
                            URL.revokeObjectURL(url);
                            showCustomDialog("SUKSES!", "File '" + data.name + "' berhasil diterima.", "OK");
                            transferOverlay.style.display = 'none';
                            closeModeOverlay();
                        }, 500);
                    }
                });

                // Perbaikan kritis: Jangan tutup overlay terima
            });
        }

        // --- Mode Koneksi: Terima & QR Code ---
        function startReceiveMode() {
            modeOverlay.style.display = 'flex';
            modeTitle.innerText = "MODE TERIMA";
            qrContainer.style.display = 'flex';
            scannerContainer.style.display = 'none';
            startNetwork();
        }

        function generateQrCode(text) {
            QRCode.toCanvas(qrCodeEl, text, { width: 180, margin: 1 }, (error) => {
                if (error) console.error(error);
            });
        }

        // --- Mode Koneksi: Kirim & QR Scanner ---
        function startSendMode() {
            fileInput.click();
            fileInput.onchange = () => {
                if (fileInput.files.length === 0) return;
                
                modeOverlay.style.display = 'flex';
                modeTitle.innerText = "PINDAI PENERIMA";
                qrContainer.style.display = 'none';
                scannerContainer.style.display = 'block';
                modeStatusText.innerText = "Pindai QR Code perangkat 'TERIMA FILE'.";
                
                startNetwork();
                startQrScanner();
            };
        }

        function startQrScanner() {
            codeReader = new ZXing.BrowserQRCodeReader();
            const videoInputDeviceIds = [];
            
            codeReader.getVideoInputDevices()
                .then(videoInputDevices => {
                    videoInputDevices.forEach(device => videoInputDeviceIds.push(device.deviceId));
                    const selectedDeviceId = videoInputDeviceIds[0];

                    codeReader.decodeFromVideoDevice(selectedDeviceId, scannerVideo, (result, err) => {
                        if (result) {
                            modeStatusText.innerText = "Terhubung! Memulai pengiriman...";
                            const targetId = result.text;
                            stopQrScanner();
                            sendFiles(targetId);
                        }
                    });
                })
                .catch(err => {
                    modeStatusText.innerText = "Kamera gagal diakses.";
                    console.error(err);
                });
        }

        function stopQrScanner() {
            if (codeReader) {
                codeReader.reset();
                codeReader = null;
            }
        }

        function closeModeOverlay() {
            modeOverlay.style.display = 'none';
            stopQrScanner();
            if (peer) {
                peer.destroy();
                peer = null;
            }
        }

        // --- Transfer Logic Kritis ---
        function sendFiles(targetId) {
            const file = fileInput.files[0];
            const conn = peer.connect(targetId, { reliable: true });

            transferOverlay.style.display = 'flex';
            transferStatus.innerText = "Mengirim " + file.name + "...";
            transferMeta.innerText = "Membuat koneksi P2P...";
            setProgress(0);

            conn.on('open', () => {
                transferStatus.innerText = "Transfer Dimulai!";
                // Kirim metadata
                conn.send({ type: 'transfer-init', name: file.name, size: file.size });
                
                // Mulai pengiriman file (WebRTC DataChannel lokal)
                const startTime = Date.now();
                sendFileChunks(conn, file, startTime);
            });

            conn.on('error', (err) => {
                showCustomDialog("Transfer Gagal", "Gagal koneksi P2P ke perangkat tujuan.", "OK");
                transferOverlay.style.display = 'none';
                closeModeOverlay();
            });
        }

        function sendFileChunks(conn, file, startTime) {
            const chunkSize = 64 * 1024; // 64KB chunks (paling stabil untuk HP)
            const totalChunks = Math.ceil(file.size / chunkSize);
            let currentChunk = 0;

            const sendNextChunk = () => {
                const start = currentChunk * chunkSize;
                const end = Math.min(start + chunkSize, file.size);
                const blob = file.slice(start, end);
                const reader = new FileReader();

                reader.onload = () => {
                    if (conn.open) {
                        conn.send({ type: 'file-chunk', data: reader.result, currentChunk, totalChunks });
                        
                        // Perbarui progres setiap 10 chunk
                        if(currentChunk % 10 === 0) {
                            const percent = Math.floor((currentChunk / totalChunks) * 100);
                            setProgress(percent);
                            const elapsed = Date.now() - startTime;
                                                        const currentSpeed = (currentChunk * chunkSize) / (elapsed / 1000);
                            conn.send({ 
                                type: 'transfer-progress', 
                                percent, 
                                duration: elapsed, 
                                currentChunk, 
                                totalChunks 
                            });
                            transferMeta.innerText = `Speed: ${formatSpeed(currentSpeed)} | Est: ${formatTimeRemaining(elapsed, totalChunks, currentChunk)}`;
                        }

                        currentChunk++;
                        if (currentChunk < totalChunks) {
                            // Gunakan setImmediate atau setTimeout 0 agar UI tidak hang saat kirim file GB
                            setTimeout(sendNextChunk, 0);
                        } else {
                            // SEMUA CHUNK TERKIRIM
                            const elapsedTotal = (Date.now() - startTime) / 1000;
                            console.log(`Selesai dalam ${elapsedTotal} detik`);
                            
                            conn.send({ 
                                type: 'file-final', 
                                file: file, 
                                name: file.name 
                            });
                            
                            setProgress(100);
                            statusText.innerText = "FILE TERKIRIM!";
                            
                            setTimeout(() => {
                                showCustomDialog("BERHASIL", "File '" + file.name + "' terkirim dalam " + elapsedTotal.toFixed(1) + " detik.", "MANTAP");
                                hideTransferOverlay();
                            }, 1000);
                        }
                    }
                };
                reader.readAsArrayBuffer(blob);
            };

            // Mulai iterasi pengiriman
            sendNextChunk();
        }

        // --- FUNGSI HELPER UI ---

        function setProgress(percent) {
            const offset = circumference - (percent / 100 * circumference);
            progressBar.style.strokeDashoffset = offset;
            progressVal.innerText = percent + "%";
            
            // Efek glow warna hijau kalau sudah mau selesai
            if(percent > 80) {
                progressBar.style.filter = "drop-shadow(0 0 20px var(--primary))";
            }
        }

        function formatSpeed(bps) {
            if (bps > 1024 * 1024) return (bps / (1024 * 1024)).toFixed(2) + " MB/s";
            return (bps / 1024).toFixed(2) + " KB/s";
        }

        function formatTimeRemaining(elapsed, totalChunks, currentChunk) {
            const avgTimePerChunk = elapsed / currentChunk;
            const remainingChunks = totalChunks - currentChunk;
            const remainingMs = remainingChunks * avgTimePerChunk;
            const sec = Math.ceil(remainingMs / 1000);
            return sec + "s";
        }

        function hideTransferOverlay() {
            transferOverlay.classList.add('fade-out');
            setTimeout(() => {
                transferOverlay.style.display = 'none';
                transferOverlay.classList.remove('fade-out');
                closeModeOverlay(); // Reset ke menu utama
            }, 800);
        }

        // Mencegah HP sleep saat transfer (Experimental)
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(() => {});
        }
    </script>
</body>
</html>
